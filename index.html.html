<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>VetCloud — Historia Clínica Veterinaria</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root {
    --navy: #0a2342;
    --navy-mid: #1a3a5c;
    --blue: #1e6fa0;
    --blue-light: #2e9ed6;
    --blue-pale: #e8f4fd;
    --blue-soft: #cce6f7;
    --accent: #0fb4e7;
    --white: #ffffff;
    --gray-50: #f8fafc;
    --gray-100: #f1f5f9;
    --gray-200: #e2e8f0;
    --gray-300: #cbd5e1;
    --gray-500: #64748b;
    --gray-700: #334155;
    --gray-900: #0f172a;
    --success: #16a34a;
    --success-bg: #dcfce7;
    --warn: #d97706;
    --warn-bg: #fef3c7;
    --danger: #dc2626;
    --danger-bg: #fee2e2;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(10,35,66,0.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--gray-50);
    color: var(--gray-900);
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── LAYOUT ── */
  #app { display: flex; min-height: 100vh; }

  /* SIDEBAR */
  #sidebar {
    width: 240px;
    min-width: 240px;
    background: var(--navy);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 100;
    transition: transform 0.25s ease;
  }

  .sidebar-logo {
    padding: 20px 20px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .sidebar-logo .logo-mark {
    display: flex; align-items: center; gap: 10px;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: var(--blue-light);
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .logo-text { color: white; }
  .logo-text .brand { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  .logo-text .tagline { font-size: 10px; color: rgba(255,255,255,0.5); margin-top: 1px; }

  .sidebar-section { padding: 16px 12px 8px; }
  .sidebar-section-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.8px;
    color: rgba(255,255,255,0.35); text-transform: uppercase;
    padding: 0 8px; margin-bottom: 6px;
  }

  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px; border-radius: var(--radius-sm);
    color: rgba(255,255,255,0.65); cursor: pointer;
    transition: all 0.15s; font-size: 13.5px; font-weight: 450;
    border: none; background: none; width: 100%; text-align: left;
  }

  .nav-item:hover { background: rgba(255,255,255,0.07); color: white; }
  .nav-item.active { background: var(--blue-light); color: white; }

  .nav-icon { font-size: 16px; width: 18px; text-align: center; }

  .sidebar-footer {
    margin-top: auto; padding: 16px 12px;
    border-top: 1px solid rgba(255,255,255,0.08);
  }

  /* MAIN */
  #main {
    margin-left: 240px;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  #topbar {
    height: 56px;
    background: white;
    border-bottom: 1px solid var(--gray-200);
    display: flex;
    align-items: center;
    padding: 0 24px;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 50;
  }

  .topbar-title { font-size: 16px; font-weight: 600; color: var(--navy); flex: 1; }

  #content { padding: 24px; flex: 1; }

  /* ── COMPONENTS ── */
  .card {
    background: white; border: 1px solid var(--gray-200);
    border-radius: var(--radius); padding: 20px;
    box-shadow: var(--shadow);
  }

  .card-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
  }

  .card-title { font-size: 15px; font-weight: 600; color: var(--navy); }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500; cursor: pointer;
    border: none; transition: all 0.15s; text-decoration: none;
  }

  .btn-primary {
    background: var(--blue); color: white;
  }
  .btn-primary:hover { background: var(--navy-mid); }

  .btn-navy {
    background: var(--navy); color: white;
  }
  .btn-navy:hover { background: var(--navy-mid); }

  .btn-outline {
    background: white; color: var(--blue); border: 1px solid var(--blue-soft);
  }
  .btn-outline:hover { background: var(--blue-pale); }

  .btn-ghost {
    background: transparent; color: var(--gray-500);
    border: 1px solid var(--gray-200);
  }
  .btn-ghost:hover { background: var(--gray-100); color: var(--gray-700); }

  .btn-danger {
    background: var(--danger-bg); color: var(--danger);
    border: 1px solid #fca5a5;
  }

  .btn-sm { padding: 5px 10px; font-size: 12px; }

  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px; border-radius: 20px;
    font-size: 11.5px; font-weight: 500;
  }

  .badge-blue { background: var(--blue-pale); color: var(--blue); }
  .badge-green { background: var(--success-bg); color: var(--success); }
  .badge-warn { background: var(--warn-bg); color: var(--warn); }
  .badge-red { background: var(--danger-bg); color: var(--danger); }
  .badge-gray { background: var(--gray-100); color: var(--gray-500); }

  /* Forms */
  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 12.5px; font-weight: 500; color: var(--gray-700); margin-bottom: 5px; }
  .form-label .req { color: var(--danger); margin-left: 2px; }

  .form-input, .form-select, .form-textarea {
    width: 100%; padding: 9px 12px;
    border: 1px solid var(--gray-300); border-radius: var(--radius-sm);
    font-size: 13.5px; color: var(--gray-900); background: white;
    transition: border-color 0.15s; outline: none; font-family: inherit;
  }

  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: var(--blue-light); box-shadow: 0 0 0 3px rgba(46,158,214,0.12);
  }

  .form-textarea { resize: vertical; min-height: 80px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

  /* Grid */
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
  .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

  /* Stats */
  .stat-card {
    background: white; border: 1px solid var(--gray-200);
    border-radius: var(--radius); padding: 18px 20px;
    box-shadow: var(--shadow);
  }

  .stat-label { font-size: 12px; color: var(--gray-500); margin-bottom: 6px; font-weight: 500; }
  .stat-value { font-size: 28px; font-weight: 700; color: var(--navy); line-height: 1; }
  .stat-sub { font-size: 12px; color: var(--gray-500); margin-top: 4px; }
  .stat-icon {
    width: 38px; height: 38px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; margin-bottom: 10px;
  }

  /* Table */
  .table-wrap { overflow-x: auto; }

  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: var(--gray-50); padding: 10px 14px;
    text-align: left; font-size: 11.5px; font-weight: 600;
    color: var(--gray-500); text-transform: uppercase; letter-spacing: 0.5px;
    border-bottom: 1px solid var(--gray-200);
  }
  tbody td {
    padding: 12px 14px; border-bottom: 1px solid var(--gray-100);
    font-size: 13.5px; color: var(--gray-700);
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--gray-50); }

  /* Avatar */
  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; flex-shrink: 0;
  }

  .avatar-blue { background: var(--blue-pale); color: var(--blue); }
  .avatar-navy { background: rgba(10,35,66,0.1); color: var(--navy); }

  .pet-avatar {
    width: 36px; height: 36px; border-radius: 10px;
    background: var(--blue-pale); display: flex;
    align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;
  }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(10,35,66,0.45);
    z-index: 200; display: flex; align-items: center; justify-content: center;
    padding: 20px;
    animation: fadeIn 0.15s ease;
  }

  .modal {
    background: white; border-radius: 14px;
    width: 100%; max-width: 600px; max-height: 90vh;
    overflow-y: auto; box-shadow: var(--shadow-md);
    animation: slideUp 0.2s ease;
  }

  .modal-lg { max-width: 800px; }

  .modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--gray-200);
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top: 0; background: white; z-index: 1; border-radius: 14px 14px 0 0;
  }

  .modal-title { font-size: 16px; font-weight: 600; color: var(--navy); }
  .modal-body { padding: 20px 24px; }
  .modal-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--gray-200);
    display: flex; justify-content: flex-end; gap: 8px;
  }

  .btn-close {
    background: none; border: none; cursor: pointer;
    color: var(--gray-500); font-size: 18px; padding: 4px;
    border-radius: 6px; display: flex; align-items: center;
  }
  .btn-close:hover { background: var(--gray-100); color: var(--gray-700); }

  /* Tabs */
  .tabs { display: flex; gap: 2px; border-bottom: 2px solid var(--gray-200); margin-bottom: 20px; }

  .tab-btn {
    padding: 8px 16px; font-size: 13px; font-weight: 500;
    color: var(--gray-500); border: none; background: none; cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -2px;
    transition: all 0.15s;
  }

  .tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }
  .tab-btn:hover:not(.active) { color: var(--gray-700); }

  /* Animations */
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

  /* Search */
  .search-wrap { position: relative; }
  .search-wrap .search-icon {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: var(--gray-500); font-size: 14px;
  }
  .search-input {
    padding-left: 34px !important;
  }

  /* Empty state */
  .empty-state { text-align: center; padding: 48px 24px; }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-title { font-size: 15px; font-weight: 600; color: var(--gray-700); margin-bottom: 6px; }
  .empty-sub { font-size: 13px; color: var(--gray-500); }

  /* Timeline */
  .timeline { position: relative; padding-left: 24px; }
  .timeline::before {
    content: ''; position: absolute; left: 7px; top: 0; bottom: 0;
    width: 2px; background: var(--gray-200);
  }

  .timeline-item { position: relative; margin-bottom: 20px; }
  .timeline-dot {
    position: absolute; left: -21px; top: 4px;
    width: 12px; height: 12px; border-radius: 50%;
    border: 2px solid white; background: var(--blue);
  }

  .timeline-card {
    background: white; border: 1px solid var(--gray-200);
    border-radius: var(--radius); padding: 14px 16px;
    box-shadow: var(--shadow);
  }

  .timeline-meta { font-size: 11.5px; color: var(--gray-500); margin-bottom: 6px; }
  .timeline-title { font-size: 13.5px; font-weight: 600; color: var(--navy); margin-bottom: 4px; }

  /* Attachments */
  .attachment-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 12px; border: 1px solid var(--gray-200);
    border-radius: var(--radius-sm); margin-bottom: 6px;
  }

  .attach-icon { font-size: 20px; }
  .attach-name { font-size: 13px; font-weight: 500; color: var(--gray-700); flex: 1; }
  .attach-size { font-size: 11px; color: var(--gray-500); }

  /* File upload */
  .file-upload-area {
    border: 2px dashed var(--gray-300); border-radius: var(--radius);
    padding: 24px; text-align: center; cursor: pointer;
    transition: all 0.15s;
  }
  .file-upload-area:hover { border-color: var(--blue-light); background: var(--blue-pale); }
  .file-upload-area.drag { border-color: var(--blue-light); background: var(--blue-pale); }

  /* Mobile */
  .mobile-toggle {
    display: none; background: none; border: none; cursor: pointer;
    font-size: 20px; color: var(--navy); padding: 6px;
  }

  .sidebar-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.4); z-index: 99;
  }

  /* Vitals grid */
  .vital-box {
    background: var(--gray-50); border: 1px solid var(--gray-200);
    border-radius: var(--radius-sm); padding: 10px 12px; text-align: center;
  }
  .vital-label { font-size: 11px; color: var(--gray-500); margin-bottom: 4px; }
  .vital-value { font-size: 16px; font-weight: 700; color: var(--navy); }
  .vital-unit { font-size: 11px; color: var(--gray-500); }

  /* Patient card */
  .patient-mini-card {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; border: 1px solid var(--gray-200);
    border-radius: var(--radius); cursor: pointer; transition: all 0.15s;
    background: white;
  }
  .patient-mini-card:hover { border-color: var(--blue-light); box-shadow: 0 0 0 3px rgba(46,158,214,0.1); }

  .info-row { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--gray-500); margin-bottom: 3px; }

  /* Loading */
  .spinner {
    width: 20px; height: 20px; border: 2px solid var(--gray-200);
    border-top-color: var(--blue); border-radius: 50%;
    animation: spin 0.6s linear infinite; display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Responsive */
  @media (max-width: 768px) {
    #sidebar { transform: translateX(-100%); }
    #sidebar.open { transform: translateX(0); }
    #main { margin-left: 0; }
    .sidebar-backdrop.show { display: block; }
    .mobile-toggle { display: flex; }
    .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
    .form-row, .form-row-3 { grid-template-columns: 1fr; }
    #content { padding: 16px; }
    .topbar-title { font-size: 14px; }
    .modal { max-width: 100%; }
    .stat-value { font-size: 22px; }
    table { font-size: 12.5px; }
    thead th, tbody td { padding: 8px 10px; }
  }

  @media (max-width: 480px) {
    .btn { padding: 7px 12px; font-size: 12px; }
    .card { padding: 14px; }
  }

  /* Drive status bar */
  .drive-status {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 12px; background: var(--gray-100); border-radius: 20px;
    font-size: 12px; color: var(--gray-500);
  }
  .drive-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gray-300); }
  .drive-dot.connected { background: var(--success); }

  /* Print styles */
  @media print {
    #sidebar, #topbar, .no-print { display: none !important; }
    #main { margin-left: 0; }
    body { background: white; }
  }

  .section-divider {
    font-size: 11px; font-weight: 600; letter-spacing: 0.6px;
    text-transform: uppercase; color: var(--gray-500);
    display: flex; align-items: center; gap: 8px; margin: 20px 0 12px;
  }
  .section-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--gray-200);
  }

  .pill-select {
    display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px;
  }
  .pill-opt {
    padding: 5px 12px; border-radius: 20px; font-size: 12.5px;
    border: 1px solid var(--gray-300); cursor: pointer; transition: all 0.15s;
    background: white; color: var(--gray-700);
  }
  .pill-opt.selected { background: var(--blue); color: white; border-color: var(--blue); }

  .history-export-header {
    background: var(--navy); color: white; padding: 24px 32px;
    display: flex; align-items: center; gap: 16px;
  }
</style>
</head>
<body>

<div id="app">
  <!-- SIDEBAR -->
  <nav id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <div class="logo-icon">🐾</div>
        <div class="logo-text">
          <div class="brand">VetCloud</div>
          <div class="tagline">Historia Clínica Veterinaria</div>
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-label">Principal</div>
      <button class="nav-item active" onclick="navigate('dashboard')">
        <span class="nav-icon">📊</span> Dashboard
      </button>
      <button class="nav-item" onclick="navigate('propietarios')">
        <span class="nav-icon">👤</span> Propietarios
      </button>
      <button class="nav-item" onclick="navigate('pacientes')">
        <span class="nav-icon">🐶</span> Pacientes
      </button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-label">Clínica</div>
      <button class="nav-item" onclick="navigate('consultas')">
        <span class="nav-icon">🩺</span> Consultas
      </button>
      <button class="nav-item" onclick="navigate('hospitalizacion')">
        <span class="nav-icon">🏥</span> Hospitalización
      </button>
      <button class="nav-item" onclick="navigate('seguimientos')">
        <span class="nav-icon">📅</span> Seguimientos
      </button>
      <button class="nav-item" onclick="navigate('examenes')">
        <span class="nav-icon">🔬</span> Exámenes
      </button>
      <button class="nav-item" onclick="navigate('formulacion')">
        <span class="nav-icon">💊</span> Formulación
      </button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-label">Reportes</div>
      <button class="nav-item" onclick="navigate('historias')">
        <span class="nav-icon">📋</span> Exportar Historias
      </button>
    </div>

    <div class="sidebar-footer">
      <div class="drive-status" id="driveStatus">
        <div class="drive-dot" id="driveDot"></div>
        <span id="driveStatusText">Sin conectar</span>
      </div>
      <button class="btn btn-outline" style="width:100%; margin-top:10px; font-size:12px;" onclick="connectDrive()">
        <span>🔗</span> Conectar Google Drive
      </button>
    </div>
  </nav>

  <!-- BACKDROP -->
  <div class="sidebar-backdrop" id="backdrop" onclick="closeSidebar()"></div>

  <!-- MAIN -->
  <div id="main">
    <div id="topbar">
      <button class="mobile-toggle" onclick="toggleSidebar()">☰</button>
      <div class="topbar-title" id="topbarTitle">Dashboard</div>
      <div id="topbarActions"></div>
    </div>
    <div id="content"></div>
  </div>
</div>

<!-- MODAL CONTAINER -->
<div id="modalContainer"></div>

<script>
// ═══════════════════════════════════════════
// DATA STORE — LocalStorage + Google Sheets
// ═══════════════════════════════════════════
const SHEETS_API = 'https://script.google.com/macros/s/AKfycbwCDZ4TaqxmigUHwINi3qh2m4tvCFcJleP7WzKF-c1pzDkP74uUhyqr-ho75nN3W59NNQ/exec';
const STORES = ['propietarios','pacientes','consultas','hospitalizaciones','seguimientos','examenes','formulaciones'];

let syncTimeout = null;
let syncStatus = 'idle'; // idle | syncing | ok | error

const DB = {
  get(key) {
    try { return JSON.parse(localStorage.getItem('vc_' + key)) || []; } catch { return []; }
  },
  set(key, val) {
    try {
      localStorage.setItem('vc_' + key, JSON.stringify(val));
      schedulSync();
    } catch {}
  },
  generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
};

function schedulSync() {
  clearTimeout(syncTimeout);
  syncTimeout = setTimeout(pushToSheets, 1500);
}

async function pushToSheets() {
  syncStatus = 'syncing';
  updateDriveStatus();
  try {
    for (const store of STORES) {
      const data = DB.get(store);
      await fetch(SHEETS_API, {
        method: 'POST',
        body: JSON.stringify({ store, data })
      });
    }
    syncStatus = 'ok';
    localStorage.setItem('vc_last_sync', new Date().toISOString());
  } catch {
    syncStatus = 'error';
  }
  updateDriveStatus();
}

async function pullFromSheets() {
  syncStatus = 'syncing';
  updateDriveStatus();
  try {
    for (const store of STORES) {
      const res = await fetch(SHEETS_API + '?store=' + store);
      const data = await res.json();
      if (Array.isArray(data) && data.length > 0) {
        localStorage.setItem('vc_' + store, JSON.stringify(data));
      }
    }
    syncStatus = 'ok';
    localStorage.setItem('vc_last_sync', new Date().toISOString());
    navigate(currentPage);
  } catch {
    syncStatus = 'error';
  }
  updateDriveStatus();
}

function updateDriveStatus() {
  const dot = document.getElementById('driveDot');
  const txt = document.getElementById('driveStatusText');
  if (!dot || !txt) return;
  if (syncStatus === 'syncing') {
    dot.className = 'drive-dot'; dot.style.background = '#f59e0b';
    txt.textContent = 'Sincronizando…';
  } else if (syncStatus === 'ok') {
    dot.className = 'drive-dot connected'; dot.style.background = '';
    const last = localStorage.getItem('vc_last_sync');
    const hora = last ? new Date(last).toLocaleTimeString('es-CO', {hour:'2-digit',minute:'2-digit'}) : '';
    txt.textContent = 'Sheets ✓' + (hora ? ' · ' + hora : '');
  } else if (syncStatus === 'error') {
    dot.className = 'drive-dot'; dot.style.background = '#dc2626';
    txt.textContent = 'Error de sync';
  } else {
    dot.className = 'drive-dot'; dot.style.background = '';
    txt.textContent = 'Google Sheets';
  }
}

  pullFromSheets();
}

const SPECIES_EMOJI = { Perro: '🐶', Gato: '🐱', Ave: '🦜', Conejo: '🐰', Reptil: '🦎', Otro: '🐾' };

function speciesIcon(s) { return SPECIES_EMOJI[s] || '🐾'; }

function formatDate(str) {
  if (!str) return '—';
  const d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('es-CO', { day: '2-digit', month: 'short', year: 'numeric' });
}

function formatDatetime(str) {
  if (!str) return '—';
  const d = new Date(str);
  return d.toLocaleDateString('es-CO', { day: '2-digit', month: 'short', year: 'numeric' }) + ' ' + d.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
}

function today() { return new Date().toISOString().split('T')[0]; }

function getPropietario(id) { return DB.get('propietarios').find(p => p.id === id) || {}; }
function getPaciente(id) { return DB.get('pacientes').find(p => p.id === id) || {}; }

function getPropietarioByPaciente(pacId) {
  const props = DB.get('propietarios');
  return props.find(p => (p.mascotas || []).includes(pacId)) || {};
}

function getPacientesOf(propId) {
  const prop = getPropietario(propId);
  const all = DB.get('pacientes');
  return all.filter(p => (prop.mascotas || []).includes(p.id));
}

function getRegistrosOf(pacienteId) {
  const consultas = DB.get('consultas').filter(r => r.pacienteId === pacienteId);
  const hosps = DB.get('hospitalizaciones').filter(r => r.pacienteId === pacienteId);
  const segs = DB.get('seguimientos').filter(r => r.pacienteId === pacienteId);
  const exs = DB.get('examenes').filter(r => r.pacienteId === pacienteId);
  const forms = DB.get('formulaciones').filter(r => r.pacienteId === pacienteId);
  return [...consultas, ...hosps, ...segs, ...exs, ...forms].sort((a, b) => new Date(a.fecha) - new Date(b.fecha));
}

const TIPO_LABELS = {
  consulta: { label: 'Consulta', color: 'badge-blue', icon: '🩺' },
  hospitalizacion: { label: 'Hospitalización', color: 'badge-red', icon: '🏥' },
  seguimiento: { label: 'Seguimiento', color: 'badge-warn', icon: '📅' },
  examen: { label: 'Examen', color: 'badge-green', icon: '🔬' },
  formulacion: { label: 'Formulación', color: 'badge-gray', icon: '💊' }
};

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

function formatFileSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

function guardarPaciente(id) {
  const nombre = document.getElementById('fp_nombre').value.trim();
  const propId = document.getElementById('fp_propietario').value;
  if (!nombre) { alert('El nombre es obligatorio'); return; }
  if (!propId) { alert('Selecciona un propietario'); return; }

  const list = DB.get('pacientes');
  const pacId = id || DB.generateId();
  const obj = {
    id: pacId, nombre, propietarioId: propId,
    especie: document.getElementById('fp_especie').value,
    raza: document.getElementById('fp_raza').value.trim(),
    sexo: document.getElementById('fp_sexo').value,
    fechaNacimiento: document.getElementById('fp_fechaNac').value,
    color: document.getElementById('fp_color').value.trim(),
    microchip: document.getElementById('fp_chip').value.trim(),
    estadoReproductivo: document.getElementById('fp_repro').value,
    antecedentes: document.getElementById('fp_antecedentes').value.trim(),
    alergias: document.getElementById('fp_alergias').value.trim(),
    creadoEn: id ? (list.find(x=>x.id===id)||{}).creadoEn : new Date().toISOString()
  };
  if (id) {
    const idx = list.findIndex(x=>x.id===id);
    if (idx>=0) list[idx] = obj;
  } else {
    list.push(obj);
  }
  DB.set('pacientes', list);

  // Asociar al propietario
  const props = DB.get('propietarios');
  const pIdx = props.findIndex(p=>p.id===propId);
  if (pIdx>=0) {
    if (!props[pIdx].mascotas) props[pIdx].mascotas = [];
    if (!props[pIdx].mascotas.includes(pacId)) props[pIdx].mascotas.push(pacId);
    DB.set('propietarios', props);
  }

  closeModal();
  pages.pacientes();
}

let tempArchivos = { c: [], h: [], s: [], e: [], f: [] };

function renderArchivos(archivos) {
  if (!archivos || archivos.length === 0) return '';
  return archivos.map((a, i) => `
    <div class="attachment-item">
      <span class="attach-icon">${getFileIcon(a.type)}</span>
      <div style="flex:1">
        <div class="attach-name">${a.name}</div>
        <div class="attach-size">${formatFileSize(a.size)}</div>
      </div>
      <a href="${a.data}" download="${a.name}" class="btn btn-ghost btn-sm">⬇</a>
    </div>`).join('');
}

function getFileIcon(type) {
  if (!type) return '📄';
  if (type.includes('pdf')) return '📕';
  if (type.includes('word') || type.includes('doc')) return '📘';
  if (type.includes('image')) return '🖼️';
  return '📄';
}

async function handleFileUpload(prefix, listId, files) {
  if (!files || files.length === 0) return;
  const arr = Array.from(files);
  const listEl = document.getElementById(listId);

  for (const file of arr) {
    const base64 = await fileToBase64(file);
    if (!tempArchivos[prefix]) tempArchivos[prefix] = [];
    tempArchivos[prefix].push({ name: file.name, size: file.size, type: file.type, data: base64 });
  }
  listEl.innerHTML = renderArchivos(tempArchivos[prefix]);
}

    const campo = r.diagnostico || r.observaciones || r.resultados || r.tipoExamen || '—';
    detalles = `<div style="background:var(--gray-50);border-radius:8px;padding:12px;font-size:13.5px;color:var(--gray-700)">${campo}</div>`;
    if (r.planTratamiento) detalles += `<div class="section-divider">Plan de tratamiento</div><p style="font-size:13.5px">${r.planTratamiento}</p>`;
    if (r.evolucion) detalles += `<div class="section-divider">Evolución</div><p style="font-size:13.5px">${r.evolucion}</p>`;
    if (r.resultados) detalles = `<div class="section-divider">Resultados</div><p style="font-size:13.5px">${r.resultados}</p>`;
  }

  return `
<div class="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal modal-lg">
    <div class="modal-header">
      <div style="display:flex;align-items:center;gap:10px">
        <span>${t.icon}</span>
        <div>
          <div class="modal-title">${t.label}</div>
          <div style="font-size:12px;color:var(--gray-500)">${formatDate(r.fecha||r.fechaIngreso)} · ${pac.nombre}</div>
        </div>
      </div>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      ${detalles}
      ${(r.archivos||[]).length > 0 ? `
        <div class="section-divider">Archivos adjuntos (${r.archivos.length})</div>
        ${r.archivos.map(a => `
          <div class="attachment-item">
            <span class="attach-icon">${getFileIcon(a.type)}</span>
            <div style="flex:1">
              <div class="attach-name">${a.name}</div>
              <div class="attach-size">${formatFileSize(a.size)}</div>
            </div>
            <a href="${a.data}" download="${a.name}" class="btn btn-outline btn-sm">⬇ Descargar</a>
            ${a.type && a.type.includes('image') ? `<a href="${a.data}" target="_blank" class="btn btn-ghost btn-sm">👁 Ver</a>` : ''}
            ${a.type && a.type.includes('pdf') ? `<a href="${a.data}" target="_blank" class="btn btn-ghost btn-sm">👁 Abrir</a>` : ''}
          </div>`).join('')}
      ` : ''}
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cerrar</button>
      <button class="btn btn-danger btn-sm" onclick="closeModal();eliminar('${store}','${r.id}')">🗑 Eliminar</button>
    </div>
  </div>
</div>`;
};

// ═══════════════════════════════════════════
// CRUD HELPERS
// ═══════════════════════════════════════════
function eliminar(store, id) {
  if (!confirm('¿Eliminar este registro? Esta acción no se puede deshacer.')) return;
  const list = DB.get(store).filter(x => x.id !== id);
  DB.set(store, list);

  // Si es propietario, limpiar referencia
  if (store === 'propietarios') { navigate('propietarios'); }
  else if (store === 'pacientes') {
    const props = DB.get('propietarios').map(p => ({ ...p, mascotas: (p.mascotas||[]).filter(m=>m!==id) }));
    DB.set('propietarios', props);
    navigate('pacientes');
  }
  else if (store === 'consultas') pages.consultas();
  else if (store === 'hospitalizaciones') pages.hospitalizacion();
  else if (store === 'seguimientos') pages.seguimientos();
  else if (store === 'examenes') pages.examenes();
  else if (store === 'formulaciones') pages.formulacion();
}

// ═══════════════════════════════════════════
// EXPORT PDF — HISTORIA CLÍNICA
// ═══════════════════════════════════════════
async function exportarHistoria(pacienteId) {
  const pac = getPaciente(pacienteId);
  const prop = getPropietarioByPaciente(pacienteId);
  const registros = getRegistrosOf(pacienteId);

  // Crear contenido HTML para imprimir
  const win = window.open('', '_blank');
  win.document.write(buildHistoriaHTML(pac, prop, registros));
  win.document.close();
  win.focus();
  setTimeout(() => win.print(), 800);
}

  const registrosHTML = registros.map(r => {
    let contenido = '';

    if (r.tipo === 'consulta') {
      const vitales = [r.peso && `Peso: ${r.peso} kg`, r.temperatura && `Temperatura: ${r.temperatura} °C`,

        <tbody>${r.medicamentos.map(m=>`<tr><td><strong>${m.nombre}</strong></td><td>${m.concentracion||'—'}</td><td>${m.dosis||'—'}</td><td>${m.frecuencia||'—'}</td><td>${m.duracion||'—'}</td><td>${m.via||'—'}</td></tr>`).join('')}</tbody></table>
        ${r.indicaciones ? `<div class="field"><span class="field-label">Indicaciones:</span> ${r.indicaciones}</div>` : ''}

      contenido = `
        ${r.diagnostico ? `<div class="field"><span class="field-label">Diagnóstico de ingreso:</span><p>${r.diagnostico}</p></div>` : ''}

        ${r.peso ? `<div class="field"><span class="field-label">Peso ingreso:</span> ${r.peso} kg</div>` : ''}

      contenido = `
        ${r.tipoSeguimiento ? `<div class="field"><span class="field-label">Tipo:</span> ${r.tipoSeguimiento}</div>` : ''}

  const edad = pac.fechaNacimiento ? calcEdad(pac.fechaNacimiento) : '';

  return `<!DOCTYPE html>

  .field { margin-bottom: 8px; }
  .field-label { font-weight: 600; color: #0a2342; }
  .field p { margin-top: 3px; color: #334155; line-height: 1.5; }

  .vitals-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin: 8px 0; }
  .vital-item { background: #f1f5f9; border-radius: 4px; padding: 6px 10px; font-size: 11.5px; color: #1a3a5c; }

  .med-table { width: 100%; border-collapse: collapse; margin: 8px 0; font-size: 11.5px; }

}

function calcEdad(fechaNac) {
  const nac = new Date(fechaNac);
  const hoy = new Date();
  let años = hoy.getFullYear() - nac.getFullYear();
  let meses = hoy.getMonth() - nac.getMonth();
  if (meses < 0) { años--; meses += 12; }
  if (años === 0) return `${meses} mes(es)`;
  return `${años} año(s)${meses ? ', ' + meses + ' mes(es)' : ''}`;
}
